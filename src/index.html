<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ColloAfrica</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://s3.eu-west-2.amazonaws.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,300..600;1,300..600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="preload"
      href="assets/images/logo.svg"
      as="image"
      fetchpriority="high"
    />
    <!-- <link
      rel="preload"
      href="assets/images/ajo-group.webp"
      fetchpriority="high"
      as="image"
    /> -->

    <style>
      .splash {
        height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loader-ctr {
        width: 100px;
        height: 100px;
        position: relative;
      }

      .splash .img-ctr {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash img {
        animation: pulse 2s linear infinite;
      }

      .splash .loader {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        display: inline-block;
        border-top: 4px solid #470b96;
        border-right: 4px solid transparent;
        box-sizing: border-box;
        animation: rotation 1s linear infinite alternate both;
      }
      .splash .loader::after {
        content: "";
        box-sizing: border-box;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border-bottom: 4px solid #e29700;
        border-left: 4px solid transparent;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(0.5);
          opacity: 0.5;
        }
        50% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.5);
          opacity: 0.5;
        }
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        text-align: center;
        padding: 40px 20px;
        background: #ffffff;
        color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #000000;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      button {
        margin-top: 24px;
        padding: 14px 22px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background: #000000;
        color: #ffffff;
        cursor: pointer;
        font-weight: 600;
      }

      .error {
        color: #ff3b30;
        display: none;
      }
    </style>
  </head>
  <body>
    <ca-root>
      <div class="splash">
        <div class="loader-ctr">
          <div class="loader"></div>
          <div class="img-ctr">
            <img src="assets/images/icon.png" alt="" width="44" height="44" />
          </div>
        </div>
      </div>
    </ca-root>

    <script>
      window.$zoho = window.$zoho || {};
      $zoho.salesiq = $zoho.salesiq || { ready: function () {} };
    </script>

    <script
      id="zsiqscript"
      src="https://salesiq.zohopublic.com/widget?wc=siq9e87d309f1d8ab2af0606a2aa0eb459928a3bb3cfef801c5dbf73f827f7f60a7"
      defer
    ></script>

    <script>
      function getPlatform() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        if (/android/i.test(ua)) return "android";
        if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "ios";
        return "web";
      }

      function getStoreUrl() {
        const platform = getPlatform();
        if (platform === "android") {
          return "https://play.google.com/store/apps/details?id=com.colloafrica.mobile_app";
        } else if (platform === "ios") {
          return "https://apps.apple.com/app/id6755192715";
        }
        return null;
      }

      function openStore() {
        const url = getStoreUrl();
        if (url) {
          window.location.href = url;
        } else {
          document.getElementById("error").style.display = "block";
          document.getElementById("error").textContent =
            "Please visit the App Store or Google Play Store to download the app.";
        }
      }

      function tryOpenApp() {
        const platform = getPlatform();
        const currentUrl = window.location.href;
        const path = currentUrl.replace("https://app.colloafrica.com", "");

        if (platform === "ios") {
          window.location.href = `colloafrica://${path}`;
          setTimeout(() => {
            window.location.href = currentUrl;
          }, 500);
        } else if (platform === "android") {
          const intentUrl = `intent://${path}#Intent;scheme=https;package=com.colloafrica.mobile_app;S.browser_fallback_url=${encodeURIComponent(getStoreUrl())};end`;
          window.location.href = intentUrl;

          setTimeout(() => {
            window.location.href = currentUrl;
          }, 500);
        }
      }

      tryOpenApp();
      setTimeout(() => {
        const storeUrl = getStoreUrl();
        if (storeUrl && document.visibilityState !== "hidden") {
          window.location.href = storeUrl;
        }
      }, 3000);
    </script>
  </body>
</html>
